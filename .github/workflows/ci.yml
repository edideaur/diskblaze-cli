name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - name: Install uv
        uses: astral-sh/setup-uv@v3
      - name: Set up Python ${{ matrix.python-version }}
        run: uv python install ${{ matrix.python-version }}
      - name: Install
        run: uv sync --extra dev
      - name: Lint (ruff)
        run: uv run ruff check diskblaze tests
      - name: Format check (ruff)
        run: uv run ruff format --check diskblaze tests
      - name: Type check (ty)
        run: uv run ty check
      - name: Test
        run: uv run pytest -q
